#
# When any market_data_stream is configured:
# - token_filter_file becomes required
# - max_book_contracts limits the number of active books
# - day-limit orders rest until top-of-book crosses
# - fills can be partial against current top-of-book quantity
# - IOC leftovers are cancelled after any partial trade
#
token_filter_file=nse_fo_exchange_sim/config/example_tokens.txt
max_book_contracts=21
