# Bind addresses and ports
listen_host=127.0.0.1
gr_tls_port=24143
session_port=25100

# TLS material
tls_cert_pem=nse_fo_exchange_sim/testdata/tls/server.crt
tls_key_pem=nse_fo_exchange_sim/testdata/tls/server.key

# FO session defaults
box_id=17520
default_stream_no=1
exchange_order_number_start=1000000
fill_number_start=1
fill_delay_us=0

# Optional market-data driven matching.
# Repeat market_data_stream for each UDP or multicast source.
# Format: <host>:<port>@<interface_ip>
